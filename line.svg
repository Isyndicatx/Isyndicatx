<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 12" width="500" height="12">
  <style>
    @keyframes drip {
      0%   { width: 0px; opacity: 0; }
      10%  { opacity: 1; }
      50%  { width: 500px; opacity: 1; }
      80%  { width: 500px; opacity: 1; }
      95%  { width: 500px; opacity: 0; }
      100% { width: 0px; opacity: 0; }
    }
    .line {
      animation: drip 6s ease-in-out infinite;
    }
  </style>
  <rect class="line" x="0" y="5" height="1" width="0" fill="#555555" rx="1"/>
</svg>
