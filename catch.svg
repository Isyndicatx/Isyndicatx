<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 50" width="500" height="50">
  <style>
    @keyframes fade {
      0%   { opacity: 0; }
      28%  { opacity: 0; }
      38%  { opacity: 1; }
      75%  { opacity: 1; }
      90%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes starpulse {
      0%   { opacity: 0; }
      35%  { opacity: 0; }
      50%  { opacity: 1; }
      75%  { opacity: 0.6; }
      90%  { opacity: 0; }
      100% { opacity: 0; }
    }
    .txt {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 14px;
      fill: #888888;
      text-anchor: middle;
      animation: fade 12s ease-in-out infinite;
    }
    .star {
      font-size: 10px;
      fill: #aaaaaa;
      text-anchor: middle;
      animation: starpulse 12s ease-in-out infinite;
    }
  </style>
  <text x="237" y="30" class="txt">catch flights, not feelings.</text>
  <text x="337" y="24" class="star">✦</text>
</svg>
